<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-primary); font-family: var(--font-ui);
         padding: 22px; color: var(--text-primary); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 20px; margin-bottom: 18px; }
  .lbl { font-size: var(--fs-micro); color: var(--text-muted); text-transform: uppercase;
         letter-spacing: 1px; width: 100%; margin: 2px 0 -6px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Toggle, RangeSlider, SegmentedControl } = window.ScripturaDesignSystem_72b484;
  function Demo() {
    const [on, setOn] = React.useState(true);
    const [off, setOff] = React.useState(false);
    const [stroke, setStroke] = React.useState(8);
    const [mode, setMode] = React.useState('sequential');
    const [range, setRange] = React.useState('last5');
    return (
      <React.Fragment>
        <div className="lbl">Toggle</div>
        <div className="row">
          <Toggle checked={on} onChange={setOn} label="Show Guide" />
          <Toggle checked={off} onChange={setOff} label="Off state" />
        </div>
        <div className="lbl">Range slider</div>
        <div className="row">
          <RangeSlider label="Stroke:" value={stroke} onChange={setStroke} />
        </div>
        <div className="lbl">Segmented control</div>
        <div className="row">
          <SegmentedControl accent="practice" value={mode} onChange={setMode}
            options={['sequential','random','unpracticed'].map(v => ({value:v, label:v[0].toUpperCase()+v.slice(1)}))} />
          <SegmentedControl accent="review" value={range} onChange={setRange}
            options={[{value:'last5',label:'Last 5'},{value:'overall',label:'Overall'}]} />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
