<!-- @dsCard group="Type" viewport="700x200" name="Glyph Scale" subtitle="The practiced characters — tab, prompt, answer & main sizes" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-card);font-family:var(--font-ui);padding:18px;color:var(--text-primary);
       display:flex;align-items:flex-end;gap:28px;height:164px;}
  .item{text-align:center;}
  .g{font-family:var(--font-burmese);line-height:1;color:var(--text-primary);}
  .tok{display:block;font-size:var(--fs-hint);color:var(--text-muted);margin-top:8px;}
</style></head>
<body>
  <div class="item"><span class="g" style="font-size:var(--glyph-tab)">က</span><span class="tok">tab · 1.4rem</span></div>
  <div class="item"><span class="g" style="font-size:var(--glyph-prompt);color:var(--accent-indic)">က</span><span class="tok">prompt · 4.5rem</span></div>
  <div class="item"><span class="g" style="font-size:var(--glyph-answer)">က</span><span class="tok">answer · 5rem</span></div>
  <div class="item"><span class="g" style="font-size:var(--glyph-main)">က</span><span class="tok">main · 7rem</span></div>
</body></html>
